name: 功能请求 | Feature Request
description: 记录功能想法 | Record a feature idea
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        这是一个以个人使用为主、按需维护的 fork。Issues 主要用于记录想法，我会结合自己的需求和时间按需查看，不保证回复或实现。
        
        This is a personal-use fork maintained as needed. Issues are mainly for recording ideas and may be reviewed based on personal needs and available time; replies and implementation are not guaranteed. English and Chinese are both fine.
  - type: textarea
    id: feature
    attributes:
      label: 💡 预期的功能 | Expected Feature
      description: |
        请详细描述您期望添加的功能，包括使用场景和希望达到的效果。
        
        Please describe in detail the feature you want to add, including usage scenarios and desired effects.
    validations:
      required: true
